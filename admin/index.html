<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lineat Story Admin</title>
  <style>
    :root {
      --bg: #f5f0e7;
      --panel: #fffaf2;
      --ink: #2f2418;
      --accent: #d98041;
      --accent-2: #4f7f84;
      --line: #d9cbb8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang TC", "Noto Sans TC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(217,128,65,.15), transparent 24%),
        radial-gradient(circle at bottom right, rgba(79,127,132,.16), transparent 28%),
        var(--bg);
    }
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr 360px;
      min-height: 100vh;
    }
    .sidebar, .inspector {
      background: rgba(255,250,242,.92);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(12px);
      padding: 20px;
      overflow: auto;
    }
    .inspector {
      border-right: 0;
      border-left: 1px solid var(--line);
    }
    .canvas-wrap {
      padding: 18px;
      overflow: auto;
      position: relative;
    }
    .toolbar, .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 12px 24px rgba(47,36,24,.06);
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    h2 { font-size: 16px; margin-bottom: 12px; }
    p { line-height: 1.5; }
    button, input, textarea, select {
      font: inherit;
    }
    .button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-weight: 700;
      margin-top: 8px;
    }
    .button.secondary {
      background: var(--accent-2);
    }
    .button.ghost {
      background: #eadfcd;
      color: var(--ink);
    }
    .story-item {
      padding: 12px;
      border-radius: 14px;
      background: #f0e7d8;
      margin-bottom: 10px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .story-item.active {
      border-color: var(--accent);
      background: #fff4e7;
    }
    .canvas {
      position: relative;
      min-width: 1400px;
      min-height: 900px;
      background:
        linear-gradient(to right, rgba(47,36,24,.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(47,36,24,.06) 1px, transparent 1px),
        #fcf8f1;
      background-size: 28px 28px;
      border-radius: 24px;
      border: 1px solid var(--line);
    }
    .edges {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .node {
      position: absolute;
      width: 260px;
      background: white;
      border: 2px solid #d9cbb8;
      border-radius: 18px;
      box-shadow: 0 12px 24px rgba(47,36,24,.08);
      overflow: hidden;
      cursor: grab;
    }
    .node.active {
      border-color: var(--accent);
      box-shadow: 0 16px 28px rgba(217,128,65,.18);
    }
    .node-head {
      padding: 12px 14px;
      background: #f5ead9;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }
    .node-meta {
      font-size: 12px;
      opacity: .72;
      margin-top: 4px;
    }
    .node-body {
      padding: 12px 14px 14px;
      font-size: 14px;
      line-height: 1.45;
      color: #5a4b3d;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: white;
    }
    .field textarea {
      min-height: 92px;
      resize: vertical;
    }
    .inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .page-card {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }
    .preview-image {
      width: 100%;
      border-radius: 12px;
      margin-top: 8px;
      border: 1px solid var(--line);
    }
    .hint {
      font-size: 12px;
      color: #756554;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="toolbar">
        <h1>Lineat Admin</h1>
        <p>像寫劇本一樣建立模組，並用箭頭查看分支流向。</p>
      </div>
      <div class="section">
        <h2>Stories</h2>
        <div id="story-list"></div>
        <button class="button" id="create-story">新增故事</button>
      </div>
      <div class="section">
        <h2>新增模組</h2>
        <button class="button secondary" data-add-node="narrative">敘事圖片模組</button>
        <button class="button secondary" data-add-node="choice">雙選項分支模組</button>
        <button class="button secondary" data-add-node="carousel">多頁訊息模組</button>
        <button class="button secondary" data-add-node="dialogue">對話框模組</button>
      </div>
      <div class="section">
        <h2>儲存</h2>
        <button class="button ghost" id="save-story">儲存故事</button>
      </div>
    </aside>
    <main class="canvas-wrap">
      <div class="canvas" id="canvas">
        <svg class="edges" id="edges"></svg>
      </div>
    </main>
    <aside class="inspector">
      <div class="section">
        <h2>Story Info</h2>
        <div class="field">
          <label for="story-title">標題</label>
          <input id="story-title" />
        </div>
        <div class="field">
          <label for="story-description">描述</label>
          <textarea id="story-description"></textarea>
        </div>
      </div>
      <div class="section">
        <h2>Node Inspector</h2>
        <div id="node-inspector"></div>
      </div>
    </aside>
  </div>
  <script>
    window.ADMIN_API_BASE = '__ADMIN_API_BASE__';
  </script>
  <script src="__ADMIN_ASSET_BASE__/app.js"></script>
</body>
</html>
